<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Filme</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2>Novo Filme</h2>
<form th:action="@{/filmes/novo}" th:object="${filme}" method="post">

    <div class="mb-3">
        <label class="form-label">Título</label>
        <input type="text" th:field="*{titulo}" class="form-control"
               th:classappend="${#fields.hasErrors('titulo')} ? 'is-invalid' : (${#fields.hasAnyErrors()} ? 'is-valid' : '')">
        <div class="invalid-feedback" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Data Lançamento</label>
        <input type="date" th:field="*{dataLancamento}" class="form-control"
               th:classappend="${#fields.hasErrors('dataLancamento')} ? 'is-invalid' : (${#fields.hasAnyErrors()} ? 'is-valid' : '')">
        <div class="invalid-feedback" th:if="${#fields.hasErrors('dataLancamento')}" th:errors="*{dataLancamento}"></div>
    </div>

    <button type="submit" class="btn btn-primary">Salvar Filme</button>
    <a th:href="@{/filmes}" class="btn btn-secondary">Voltar</a>
</form>
</body>
</html>
