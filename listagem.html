<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listagem de Filmes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2>Filmes Cadastrados</h2>
<a th:href="@{/filmes/novo}" class="btn btn-success mb-3">Cadastrar Novo Filme</a>

<table class="table table-striped">
    <thead>
    <tr>
        <th>ID</th>
        <th>Título</th>
        <th>Data de Lançamento</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="filme : ${listaFilmes}">
        <td th:text="${filme.id}"></td>
        <td th:text="${filme.titulo}"></td>
        <td th:text="${#temporals.format(filme.dataLancamento, 'dd/MM/yyyy')}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
